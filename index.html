<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ONYX ARCHITECT - by vivi gioncyn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root { --v-bg: #0d1117; --v-panel: #161b22; --v-accent: #58a6ff; --v-text: #c9d1d9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        /* FIX: UI MENGGUNAKAN DVH UNTUK MENCEGAH TERPOTONG BROWSER MOBILE */
        html, body { width: 100%; height: 100dvh; overflow: hidden; position: fixed; background: var(--v-bg); color: var(--v-text); font-family: 'Fira Code', monospace; display: flex; flex-direction: column; }

        header { background: var(--v-panel); padding: 12px 18px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .brand-container { display: flex; flex-direction: column; }
        .brand-title { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 900; color: white; letter-spacing: -0.5px; text-transform: uppercase; line-height: 1; }
        .brand-sig { font-size: 7px; color: #58a6ff; font-weight: 500; text-transform: lowercase; letter-spacing: 1px; margin-top: 4px; opacity: 0.8; display: flex; align-items: center; gap: 5px; }
        .brand-sig::before { content: ""; width: 10px; height: 1px; background: #58a6ff; display: inline-block; }

        .tab-bar { background: var(--v-panel); height: 40px; display: flex; overflow-x: auto; border-bottom: 1px solid #30363d; flex-shrink: 0; scrollbar-width: none; }
        .tab { padding: 0 12px; display: flex; align-items: center; font-size: 10px; font-weight: bold; color: #8b949e; white-space: nowrap; border-right: 1px solid #30363d; text-transform: uppercase; cursor: pointer; gap: 8px; }
        .tab.active { background: var(--v-bg); color: var(--v-accent); border-bottom: 2px solid var(--v-accent); }
        .btn-close-tab { color: #f85149; font-size: 14px; opacity: 0.7; }

        .editor-wrapper { flex: 1; display: flex; overflow: hidden; position: relative; background: var(--v-bg); }
        .line-numbers { width: 35px; background: #0d1117; color: #484f58; padding-top: 15px; text-align: right; padding-right: 5px; border-right: 1px solid #30363d; font-size: 11px; line-height: 20px; overflow: hidden; }
        .scroll-container { flex: 1; position: relative; overflow: auto; }
        #highlighting { position: absolute; top: 0; left: 0; padding: 15px; width: 100%; min-width: 800px; pointer-events: none; white-space: pre; font-size: 13px; line-height: 20px; z-index: 1; }
        #editor { position: relative; width: 100%; min-width: 800px; min-height: 100%; padding: 15px; background: transparent; color: transparent; font-size: 13px; line-height: 20px; white-space: pre; border: none; outline: none; resize: none; caret-color: white; z-index: 2; -webkit-text-fill-color: transparent; }

        /* KEYBOARD PEMBANTU (SYMBOLS) */
        .helper-bar { background: #161b22; height: 45px; display: flex; align-items: center; gap: 5px; padding: 0 10px; overflow-x: auto; border-top: 1px solid #30363d; flex-shrink: 0; scrollbar-width: none; }
        .helper-btn { min-width: 40px; height: 32px; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #58a6ff; font-size: 14px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        footer { background: var(--v-panel); height: 70px; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #30363d; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
        .tool-btn { display: flex; flex-direction: column; align-items: center; font-size: 8px; font-weight: bold; color: #8b949e; text-transform: uppercase; gap: 4px; border: none; background: none; }

        /* MODAL & UI LAINNYA TETAP PERTAHANKAN LOGIKA SEBELUMNYA */
        .v-modal { display: none; position: fixed; inset: 0; background: rgba(13, 17, 23, 0.98); backdrop-filter: blur(20px); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
        .v-box { background: #161b22; width: 100%; max-width: 360px; border-radius: 24px; padding: 25px; border: 1px solid #30363d; }
        .v-input { background: #0d1117; border: 1px solid #30363d; border-radius: 12px; padding: 15px; color: white; width: 100%; margin-bottom: 15px; outline: none; font-size: 12px; font-family: 'Fira Code'; }
        
        .berkas-group { margin-bottom: 10px; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; }
        .berkas-header { background: #21262d; padding: 12px; font-size: 10px; font-weight: 900; color: #c9d1d9; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .file-container { display: none; background: #0d1117; }
        .file-item { padding: 12px; border-bottom: 1px solid #21262d; }
        .action-link { font-size: 8px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-right: 12px; }

        #v-toast { display: none; position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #58a6ff; color: white; padding: 10px 20px; border-radius: 50px; font-size: 10px; font-weight: 900; z-index: 1000; }
    </style>
</head>
<body>

    <header onclick="openModal('modal-about')">
        <div class="brand-container">
            <div class="brand-title">ONYX ARCHITECT</div>
            <div class="brand-sig">by vivi gioncyn</div>
        </div>
        <button onclick="event.stopPropagation(); executeRun();" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-black text-[9px] uppercase">Run Project</button>
    </header>

    <div class="tab-bar" id="tab-list"></div>

    <div class="editor-wrapper">
        <div id="line-nums" class="line-numbers">1</div>
        <div class="scroll-container" id="main-scroll" onscroll="syncScroll()">
            <pre id="highlighting" aria-hidden="true"><code class="language-html" id="highlight-content"></code></pre>
            <textarea id="editor" spellcheck="false" oninput="updateCore()" onkeydown="handleTab(event)"></textarea>
        </div>
    </div>

    <div class="helper-bar">
        <button class="helper-btn" onclick="insertSymbol('<')">&lt;</button>
        <button class="helper-btn" onclick="insertSymbol('>')">&gt;</button>
        <button class="helper-btn" onclick="insertSymbol('{')">{</button>
        <button class="helper-btn" onclick="insertSymbol('}')">}</button>
        <button class="helper-btn" onclick="insertSymbol('(')">(</button>
        <button class="helper-btn" onclick="insertSymbol(')')">)</button>
        <button class="helper-btn" onclick="insertSymbol('[')">[</button>
        <button class="helper-btn" onclick="insertSymbol(']')">]</button>
        <button class="helper-btn" onclick="insertSymbol(';')">;</button>
        <button class="helper-btn" onclick="insertSymbol('=')">=</button>
        <button class="helper-btn" onclick="insertSymbol('\"')">"</button>
        <button class="helper-btn" onclick="insertSymbol('/')">/</button>
    </div>

    <footer>
        <button onclick="openModal('modal-new-file')" class="tool-btn"><span>➕</span><span>Baru</span></button>
        <button onclick="startSaveFlow()" class="tool-btn"><span>💾</span><span>Simpan</span></button>
        <button onclick="downloadFile()" class="tool-btn"><span>📥</span><span>Unduh</span></button>
        <button onclick="showGudang()" class="tool-btn"><span>📦</span><span>Gudang</span></button>
        <button onclick="openModal('modal-confirm-clear')" class="tool-btn text-red-500"><span>🗑️</span><span>Hapus</span></button>
    </footer>

    <div id="v-toast">BERHASIL!</div>

    <div id="modal-gudang" class="v-modal">
        <div class="v-box h-[80dvh] flex flex-col">
            <h2 class="text-white font-black text-[11px] mb-4 uppercase text-blue-400 text-center italic">Gudang Berkas</h2>
            <input type="text" id="search-vault" class="v-input" placeholder="CARI BERKAS..." oninput="renderGudang()">
            <div id="gudang-list" class="flex-grow overflow-y-auto"></div>
            <button onclick="closeModal('modal-gudang')" class="mt-4 text-[9px] text-gray-600 font-bold uppercase">Keluar</button>
        </div>
    </div>

    <div id="modal-delete-confirm" class="v-modal">
        <div class="v-box text-center">
            <h2 id="delete-title" class="text-red-500 font-black text-[12px] mb-2 uppercase italic">Hapus?</h2>
            <p id="delete-target-text" class="text-[9px] text-gray-400 mb-6 uppercase font-bold italic"></p>
            <button id="btn-confirm-delete" class="w-full bg-red-600 py-4 rounded-xl font-black text-[10px] text-white uppercase">YA, HAPUS PERMANEN</button>
            <button onclick="closeModal('modal-delete-confirm')" class="w-full mt-3 text-gray-500 text-[9px] font-bold uppercase">BATAL</button>
        </div>
    </div>

    <div id="modal-about" class="v-modal">
        <div class="v-box text-center">
            <h2 class="text-white font-black text-[14px] uppercase italic">ONYX ARCHITECT</h2>
            <p class="text-[10px] text-blue-400 mt-4 font-black uppercase">DEVELOPED BY VIVI GIONCYN</p>
            <button onclick="closeModal('modal-about')" class="mt-6 text-gray-500 text-[9px] font-bold uppercase">Kembali</button>
        </div>
    </div>

    <div id="modal-confirm-clear" class="v-modal">
        <div class="v-box text-center">
            <h2 class="text-red-500 font-black text-[12px] mb-2 uppercase italic">Hapus Layar?</h2>
            <button onclick="executeClearAll()" class="w-full bg-red-600 py-4 rounded-xl font-black text-[10px] text-white uppercase">YA, BERSIHKAN</button>
            <button onclick="closeModal('modal-confirm-clear')" class="w-full mt-3 text-gray-500 text-[9px] font-bold uppercase">BATAL</button>
        </div>
    </div>

    <div id="modal-new-file" class="v-modal">
        <div class="v-box">
            <h2 class="text-white font-black text-[10px] mb-4 uppercase text-center text-blue-400">Berkas Baru</h2>
            <input type="text" id="input-new-filename" class="v-input" placeholder="NAMA_FILE.HTML">
            <button onclick="executeAddNewFile()" class="w-full bg-blue-600 py-4 rounded-xl font-black text-[10px] text-white uppercase">TAMBAHKAN</button>
            <button onclick="closeModal('modal-new-file')" class="w-full mt-2 text-gray-500 text-[8px] font-bold uppercase">BATAL</button>
        </div>
    </div>

    <div id="modal-save-name" class="v-modal">
        <div class="v-box">
            <h2 class="text-white font-black text-[10px] mb-4 uppercase text-center text-blue-400">Nama File</h2>
            <input type="text" id="input-filename" class="v-input">
            <button onclick="saveStep2()" class="w-full bg-blue-600 py-4 rounded-xl font-black text-[10px] text-white uppercase">LANJUT</button>
            <button onclick="closeModal('modal-save-name')" class="w-full mt-2 text-gray-500 text-[8px] font-bold uppercase">BATAL</button>
        </div>
    </div>

    <div id="modal-save-berkas" class="v-modal">
        <div class="v-box">
            <h2 class="text-white font-black text-[10px] mb-4 uppercase text-center text-blue-400">Pilih Berkas</h2>
            <input type="text" id="input-berkasname" class="v-input" placeholder="NAMA BERKAS...">
            <div id="berkas-history" class="max-h-[150px] overflow-y-auto mb-4 border-t border-gray-800 pt-2"></div>
            <button onclick="executeFinalSave()" class="w-full bg-green-700 py-4 rounded-xl font-black text-[10px] text-white uppercase">SIMPAN PERMANEN</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script>
        let projects = [{name: 'INDEX.HTML', content: ''}];
        let currentIdx = 0;
        let db = JSON.parse(localStorage.getItem('onyx_storage_v31') || '{}');

        function updateCore() {
            let code = document.getElementById('editor').value;
            if(code[code.length-1] == "\n") code += " ";
            document.getElementById('highlight-content').textContent = code;
            Prism.highlightElement(document.getElementById('highlight-content'));
            const lines = code.split('\n');
            document.getElementById('line-nums').innerHTML = lines.map((_, i) => i + 1).join('<br>');
            projects[currentIdx].content = code;
        }

        /* FITUR TAB PENUTUP */
        function renderTabs() {
            document.getElementById('tab-list').innerHTML = projects.map((f, i) => `
                <div class="tab ${i === currentIdx ? 'active' : ''}" onclick="switchTab(${i})">
                    ${f.name}
                    ${i !== 0 ? `<span class="btn-close-tab" onclick="event.stopPropagation(); deleteTab(${i})">×</span>` : ''}
                </div>
            `).join('');
        }

        function deleteTab(i) {
            projects.splice(i, 1);
            if(currentIdx >= projects.length) currentIdx = projects.length - 1;
            renderTabs(); switchTab(currentIdx);
        }

        /* LOGIKAL KEYBOARD PEMBANTU */
        function insertSymbol(sym) {
            const ed = document.getElementById('editor');
            const start = ed.selectionStart;
            const end = ed.selectionEnd;
            ed.value = ed.value.substring(0, start) + sym + ed.value.substring(end);
            ed.selectionStart = ed.selectionEnd = start + sym.length;
            ed.focus();
            updateCore();
        }

        function renderGudang() {
            const list = document.getElementById('gudang-list');
            const search = document.getElementById('search-vault').value.toUpperCase();
            list.innerHTML = '';
            Object.keys(db).forEach(berkasName => {
                if (berkasName.includes(search)) {
                    let html = `<div class="berkas-group">
                        <div class="berkas-header">
                            <div onclick="toggleFolder('${berkasName}')">📁 ${berkasName} <span class="text-[7px] opacity-50">(${db[berkasName].length} FILES)</span></div>
                            <span onclick="actionDeleteBerkas('${berkasName}')" class="text-[7px] text-red-500 font-black border border-red-900 px-2 py-1 rounded">HAPUS BERKAS</span>
                        </div>
                        <div id="folder-${berkasName}" class="file-container">`;
                    db[berkasName].forEach((file, fIdx) => {
                        html += `<div class="file-item"><div class="text-[10px] text-white font-medium">${file.name}</div><div class="mt-2 flex">
                        <span onclick="actionBuka('${berkasName}', ${fIdx})" class="action-link text-blue-400">Buka</span>
                        <span onclick="actionCopy('${berkasName}', ${fIdx})" class="action-link text-green-400">Copy</span>
                        <span onclick="actionDeleteFile('${berkasName}', ${fIdx})" class="action-link text-red-500">Hapus</span>
                        </div></div>`;
                    });
                    html += `</div></div>`;
                    list.innerHTML += html;
                }
            });
        }

        /* LOGIKA PEMISAHAN HAPUS FILE VS BERKAS */
        function actionDeleteFile(bName, fIdx) {
            document.getElementById('delete-title').textContent = "Hapus File?";
            document.getElementById('delete-target-text').textContent = `FILE: ${db[bName][fIdx].name} DARI ${bName}`;
            document.getElementById('btn-confirm-delete').onclick = () => {
                db[bName].splice(fIdx, 1);
                if(db[bName].length === 0) delete db[bName];
                saveDB(); renderGudang(); closeModal('modal-delete-confirm');
            };
            openModal('modal-delete-confirm');
        }

        function actionDeleteBerkas(bName) {
            document.getElementById('delete-title').textContent = "Hapus Berkas?";
            document.getElementById('delete-target-text').textContent = `FOLDER: ${bName} (SEMUA FILE AKAN HILANG)`;
            document.getElementById('btn-confirm-delete').onclick = () => {
                delete db[bName];
                saveDB(); renderGudang(); closeModal('modal-delete-confirm');
            };
            openModal('modal-delete-confirm');
        }

        function actionBuka(bName, fIdx) { projects = JSON.parse(JSON.stringify(db[bName])); currentIdx = fIdx; renderTabs(); switchTab(fIdx); closeModal('modal-gudang'); }
        function actionCopy(bName, fIdx) { navigator.clipboard.writeText(db[bName][fIdx].content); const toast = document.getElementById('v-toast'); toast.style.display = 'block'; setTimeout(() => toast.style.display = 'none', 2000); }
        function saveDB() { localStorage.setItem('onyx_storage_v31', JSON.stringify(db)); }
        function toggleFolder(id) { const el = document.getElementById(`folder-${id}`); el.style.display = el.style.display === 'block' ? 'none' : 'block'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function syncScroll() { document.getElementById('highlighting').scrollTop = document.getElementById('main-scroll').scrollTop; document.getElementById('line-nums').scrollTop = document.getElementById('main-scroll').scrollTop; }
        function executeRun() { const code = document.getElementById('editor').value; const frame = document.createElement('iframe'); const overlay = document.createElement('div'); overlay.style.position = 'fixed'; overlay.style.inset = '0'; overlay.style.zIndex = '1000'; overlay.style.background = 'white'; overlay.innerHTML = '<button onclick="this.parentElement.remove()" style="position:fixed; bottom:30px; right:30px; background:#ff4444; color:white; padding:15px 25px; border-radius:50px; font-weight:900; z-index:1001; font-size:10px; text-transform:uppercase;">Tutup</button>'; frame.style.width = '100%'; frame.style.height = '100%'; frame.style.border = 'none'; overlay.appendChild(frame); document.body.appendChild(overlay); const doc = frame.contentWindow.document; doc.open(); doc.write(code); doc.close(); }
        function executeClearAll() { document.getElementById('editor').value = ''; updateCore(); closeModal('modal-confirm-clear'); }
        function executeAddNewFile() { const n = document.getElementById('input-new-filename').value.trim(); if(n) { projects.push({name: n.toUpperCase(), content:''}); currentIdx = projects.length - 1; renderTabs(); switchTab(currentIdx); document.getElementById('input-new-filename').value = ''; closeModal('modal-new-file'); } }
        function showGudang() { renderGudang(); openModal('modal-gudang'); }
        function startSaveFlow() { document.getElementById('input-filename').value = projects[currentIdx].name; openModal('modal-save-name'); }
        function saveStep2() { closeModal('modal-save-name'); renderHistory(); openModal('modal-save-berkas'); }
        function renderHistory() { document.getElementById('berkas-history').innerHTML = Object.keys(db).map(k => `<div onclick="document.getElementById('input-berkasname').value='${k}'" class="p-3 text-[10px] text-gray-400 border-b border-gray-900 uppercase font-bold italic">📁 ${k}</div>`).join(''); }
        function executeFinalSave() { const b = document.getElementById('input-berkasname').value.toUpperCase(); if(!b) return; projects[currentIdx].name = document.getElementById('input-filename').value.toUpperCase(); db[b] = JSON.parse(JSON.stringify(projects)); saveDB(); closeModal('modal-save-berkas'); }
        function switchTab(i) { currentIdx = i; document.getElementById('editor').value = projects[i].content; renderTabs(); updateCore(); }
        function handleTab(e) { if(e.key === 'Tab') { e.preventDefault(); insertSymbol('    '); } }
        function downloadFile() { const blob = new Blob([document.getElementById('editor').value], {type: 'text/html'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = projects[currentIdx].name.toLowerCase(); a.click(); }

        updateCore(); renderTabs();
    </script>
</body>
</html>
