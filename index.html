<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ONYX ARCHITECT PRO v5 - Vivi Gioncyn</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#05070a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Fira+Code:wght@400;500&family=Playball&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ext-language_tools.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ext-searchbox.min.js"></script>

    <style>
        :root {
            --bg: #05070a;
            --panel: #0d1117;
            --panel2: #161b22;
            --panel3: #1c2128;
            --border: #30363d;
            --accent: #7aa2f7;
            --accent2: #bb9af7;
            --green: #9ece6a;
            --orange: #ff9e64;
            --red: #f7768e;
            --yellow: #e0af68;
            --text: #a9b1d6;
            --text-dim: #8b949e;
            --gold: #d4af37;
            --gold-light: #f1d592;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column;
            font-family: 'Fira Code', monospace;
            position: fixed;
        }

        /* ═══ HEADER ═══ */
        header {
            background: var(--panel);
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; flex-shrink: 0;
            background: linear-gradient(90deg, #0d1117 0%, #111827 100%);
        }
        .brand-wrapper { display: flex; flex-direction: column; line-height: 1; }
        .brand-title {
            font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700;
            background: linear-gradient(90deg, var(--gold), #fff8dc, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        .brand-sub {
            font-family: 'Playball', cursive; font-size: 10px; color: #ccc; opacity: 0.85;
            margin-top: 2px;
        }
        .v-badge {
            font-family: 'Fira Code', monospace; font-size: 8px;
            background: var(--accent); color: #000; padding: 1px 5px;
            border-radius: 3px; font-weight: bold; margin-left: 5px;
            vertical-align: middle;
        }
        .header-actions { display: flex; gap: 5px; align-items: center; }
        .hbtn {
            padding: 5px 10px; border-radius: 5px; font-size: 9px; font-weight: 800;
            border: none; cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase;
            display: flex; align-items: center; gap: 4px; transition: opacity 0.15s;
        }
        .hbtn:active { opacity: 0.7; }
        .hbtn-theme { background: #2d1b69; color: var(--accent2); }
        .hbtn-search { background: var(--panel3); color: var(--text); border: 1px solid var(--border); }
        .hbtn-pen { background: #1a3a2a; color: var(--green); border: 1px solid #2a5a3a; }
        .hbtn-run {
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            color: white; font-size: 10px; font-weight: 900; padding: 6px 14px;
            box-shadow: 0 0 12px rgba(59,130,246,0.4);
        }

        /* ═══ TAB BAR ═══ */
        #tab-bar {
            background: var(--panel); display: flex; overflow-x: auto;
            border-bottom: 1px solid var(--border); scrollbar-width: none; flex-shrink: 0;
            min-height: 34px;
        }
        #tab-bar::-webkit-scrollbar { display: none; }
        .tab {
            padding: 6px 10px; font-size: 10px; color: var(--text-dim);
            border-right: 1px solid var(--border);
            display: flex; align-items: center; gap: 6px; white-space: nowrap;
            cursor: pointer; transition: background 0.15s; min-width: fit-content;
        }
        .tab:hover { background: var(--panel3); }
        .tab.active { background: var(--panel2); color: var(--accent); border-bottom: 2px solid var(--accent); }
        .tab-icon { font-size: 11px; }
        .tab-name { max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
        .close-tab {
            color: var(--red); padding: 1px 4px; font-weight: bold;
            font-size: 14px; cursor: pointer; opacity: 0.7;
            transition: opacity 0.15s;
        }
        .close-tab:hover { opacity: 1; }
        .tab-add {
            padding: 6px 12px; color: var(--text-dim); cursor: pointer;
            font-size: 16px; display: flex; align-items: center;
            flex-shrink: 0; transition: color 0.15s;
        }
        .tab-add:hover { color: var(--green); }

        /* ═══ MAIN CONTAINER ═══ */
        #main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* ═══ CODEPEN MODE ═══ */
        #pen-mode-container {
            display: none; flex: 1; flex-direction: column; overflow: hidden;
        }
        .pen-panels {
            display: flex; flex: 0 0 50%; overflow: hidden;
            border-bottom: 2px solid var(--border);
        }
        .pen-panel {
            flex: 1; display: flex; flex-direction: column;
            border-right: 1px solid var(--border); overflow: hidden;
        }
        .pen-panel:last-child { border-right: none; }
        .pen-panel-header {
            background: var(--panel2); padding: 5px 10px;
            font-size: 9px; font-weight: 800; letter-spacing: 1.5px;
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; gap: 6px; flex-shrink: 0;
        }
        .pen-dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-html { background: var(--orange); }
        .dot-css { background: #38bdf8; }
        .dot-js { background: var(--yellow); }
        .pen-editor { flex: 1; overflow: hidden; }
        .pen-preview-area {
            flex: 1; background: white; overflow: hidden; display: flex; flex-direction: column;
        }
        .pen-preview-bar {
            background: var(--panel2); padding: 5px 10px;
            font-size: 9px; font-weight: 800; letter-spacing: 1.5px;
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between; flex-shrink: 0; color: var(--green);
        }
        #pen-preview-frame { flex: 1; border: none; width: 100%; background: white; }

        /* ═══ SINGLE EDITOR ═══ */
        #single-editor-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #editor { flex: 1; font-size: 13px !important; }

        /* ═══ SEARCH BAR ═══ */
        #search-bar {
            display: none; background: var(--panel2); padding: 8px 10px;
            border-bottom: 1px solid var(--border); gap: 6px; align-items: center;
            flex-shrink: 0;
        }
        .s-input {
            flex: 1; background: var(--bg); border: 1px solid var(--border);
            color: white; padding: 6px 10px; border-radius: 5px; font-size: 11px;
            outline: none; font-family: 'Fira Code', monospace;
        }
        .s-input:focus { border-color: var(--accent); }
        .s-btn {
            background: var(--panel3); color: white; border: 1px solid var(--border);
            padding: 6px 10px; border-radius: 5px; font-weight: bold; font-size: 11px; cursor: pointer;
        }
        .s-close { color: var(--red); font-size: 18px; font-weight: bold; background: none; border: none; cursor: pointer; }
        .s-count { font-size: 9px; color: var(--text-dim); white-space: nowrap; }
        .replace-row { display: flex; gap: 6px; align-items: center; margin-top: 5px; }

        /* ═══ STATUS BAR ═══ */
        #status-bar {
            background: var(--panel); height: 22px; display: flex; align-items: center;
            padding: 0 10px; gap: 12px; border-top: 1px solid var(--border);
            flex-shrink: 0; font-size: 9px; color: var(--text-dim);
        }
        .sb-item { display: flex; align-items: center; gap: 4px; }
        .sb-lang {
            background: var(--accent); color: #000; padding: 1px 6px;
            border-radius: 3px; font-weight: bold; font-size: 8px; cursor: pointer;
        }
        .sb-mode {
            background: var(--panel3); border: 1px solid var(--border);
            padding: 1px 6px; border-radius: 3px; font-size: 8px; cursor: pointer;
            color: var(--green);
        }
        #sb-cursor { font-size: 9px; color: var(--text-dim); }
        #sb-chars { font-size: 9px; color: var(--text-dim); }
        .sb-spacer { flex: 1; }

        /* ═══ QUICK TOOLBAR ═══ */
        .quick-tools {
            background: var(--panel); display: flex; overflow-x: auto; padding: 6px 5px;
            gap: 5px; border-top: 1px solid var(--border); flex-shrink: 0;
            scrollbar-width: none;
        }
        .quick-tools::-webkit-scrollbar { display: none; }
        .q-btn {
            background: var(--panel3); color: white; border: 1px solid var(--border);
            min-width: 38px; height: 36px; border-radius: 6px; font-size: 13px;
            font-weight: bold; display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: background 0.1s;
        }
        .q-btn:active { background: var(--border); }
        .q-btn-snippet {
            background: #1a2a1a; color: var(--green); border: 1px solid #2a4a2a;
            min-width: fit-content; padding: 0 10px; height: 36px; border-radius: 6px;
            font-size: 9px; font-weight: 800; white-space: nowrap; cursor: pointer;
            flex-shrink: 0; letter-spacing: 0.5px;
        }

        /* ═══ BOTTOM NAV ═══ */
        footer {
            background: var(--panel); height: 52px; display: flex; align-items: center;
            justify-content: space-around; border-top: 1px solid var(--border);
            flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom);
        }
        .tool-btn {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            font-size: 8px; color: var(--text-dim); border: none; background: none;
            cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.15s;
        }
        .tool-btn:active { background: var(--panel3); }
        .tool-btn span:first-child { font-size: 18px; }
        .tool-btn.danger { color: var(--red); }

        /* ═══ FULL PREVIEW ═══ */
        #preview-container {
            display: none; position: fixed; inset: 0; background: white;
            z-index: 2000; flex-direction: column;
        }
        #preview-header {
            background: #0d1117; color: white; padding: 0 12px;
            display: flex; justify-content: space-between; align-items: center;
            height: 44px; border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .prev-title { font-size: 10px; font-weight: 800; letter-spacing: 1px; color: var(--text-dim); }
        .prev-actions { display: flex; gap: 6px; }
        .prev-btn {
            padding: 5px 12px; border-radius: 5px; font-size: 9px; font-weight: 800;
            border: none; cursor: pointer; text-transform: uppercase;
        }
        .prev-reload { background: var(--panel3); color: var(--green); border: 1px solid var(--border); }
        .prev-close { background: var(--red); color: white; }
        #preview-frame-full { flex: 1; width: 100%; border: none; background: white; }
        .prev-url-bar {
            background: var(--panel2); padding: 5px 12px; display: flex;
            align-items: center; gap: 8px; border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .prev-url-text {
            flex: 1; background: var(--panel3); border: 1px solid var(--border);
            padding: 4px 10px; border-radius: 20px; font-size: 10px; color: var(--text-dim);
            font-family: 'Fira Code', monospace;
        }

        /* ═══ TOAST ═══ */
        #onyx-toast {
            position: fixed; bottom: 75px; left: 50%; transform: translateX(-50%);
            background: var(--panel2); border: 1px solid var(--gold);
            color: white; padding: 10px 20px; border-radius: 50px; font-size: 10px;
            font-weight: bold; z-index: 10000; display: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6); text-transform: uppercase;
            letter-spacing: 0.8px; white-space: nowrap;
            animation: toastIn 0.2s ease;
        }
        @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

        /* ═══ MODALS ═══ */
        .v-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.8); z-index: 9000;
            align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(4px);
        }
        .v-box {
            background: var(--panel2); width: 100%; max-width: 340px;
            border-radius: 14px; padding: 20px; border: 1px solid var(--gold);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .modal-title {
            font-size: 11px; font-weight: 900; letter-spacing: 1.5px;
            text-transform: uppercase; text-align: center; margin-bottom: 16px;
            color: white;
        }
        .modal-input {
            background: var(--bg); border: 1px solid var(--border);
            width: 100%; padding: 9px 12px; margin-bottom: 10px;
            border-radius: 7px; color: white; font-size: 12px; outline: none;
            font-family: 'Fira Code', monospace; transition: border 0.15s;
        }
        .modal-input:focus { border-color: var(--accent); }
        .modal-btn {
            width: 100%; padding: 11px; border-radius: 8px;
            font-size: 10px; font-weight: 900; border: none; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
            transition: opacity 0.15s;
        }
        .modal-btn:active { opacity: 0.8; }
        .btn-primary { background: linear-gradient(135deg, #1d4ed8, #3b82f6); color: white; }
        .btn-success { background: linear-gradient(135deg, #15803d, #22c55e); color: white; }
        .btn-danger { background: linear-gradient(135deg, #991b1b, #ef4444); color: white; }
        .btn-ghost { background: none; color: var(--text-dim); font-size: 10px; }

        /* ═══ GUDANG ═══ */
        .gudang-list { max-height: 280px; overflow-y: auto; margin-top: 8px; scrollbar-width: thin; }
        .folder-header {
            background: var(--panel); border: 1px solid var(--border);
            padding: 10px 12px; border-radius: 8px; margin-top: 7px;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: border-color 0.15s;
        }
        .folder-header:hover { border-color: var(--gold); }
        .folder-header-name { font-size: 11px; font-weight: 700; color: white; }
        .folder-badge {
            background: var(--panel3); color: var(--text-dim);
            font-size: 9px; padding: 2px 6px; border-radius: 10px;
        }
        .file-item {
            background: var(--panel); border: 1px solid var(--border);
            padding: 8px 12px; margin-left: 12px; margin-top: 4px;
            border-radius: 6px; display: flex; justify-content: space-between;
            align-items: center; transition: border-color 0.15s;
        }
        .file-item:hover { border-color: var(--accent); }
        .file-info { flex: 1; }
        .file-name { font-size: 10px; color: white; font-weight: 600; }
        .file-date { font-size: 8px; color: var(--text-dim); margin-top: 1px; }
        .file-actions { display: flex; gap: 4px; }
        .fa-btn {
            background: var(--panel3); border: 1px solid var(--border);
            padding: 4px 7px; border-radius: 4px; font-size: 12px; cursor: pointer;
            transition: background 0.1s;
        }
        .fa-btn:active { background: var(--border); }
        .folder-content { display: none; }

        /* ═══ FILE TYPE INDICATOR ═══ */
        .ft-html { color: var(--orange); }
        .ft-css { color: #38bdf8; }
        .ft-js { color: var(--yellow); }
        .ft-other { color: var(--text-dim); }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--panel); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
    </style>
</head>
<body>

<div id="onyx-toast"></div>

<!-- ═══ HEADER ═══ -->
<header>
    <div class="brand-wrapper">
        <div class="brand-title">Onyx Architect<span class="v-badge">v5</span></div>
        <div class="brand-sub"><span style="font-family:monospace;font-size:7px;color:var(--accent);margin-right:3px;">BY</span> Vivi Gioncyn</div>
    </div>
    <div class="header-actions">
        <button onclick="changeTheme()" class="hbtn hbtn-theme">🎨</button>
        <button onclick="toggleSearch()" class="hbtn hbtn-search">🔍</button>
        <button onclick="togglePenMode()" id="btn-pen" class="hbtn hbtn-pen">✦ PEN</button>
        <button onclick="runCode()" class="hbtn hbtn-run">▶ RUN</button>
    </div>
</header>

<!-- ═══ TAB BAR ═══ -->
<div id="tab-bar">
    <div class="tab-add" onclick="openModal('modal-new')" title="Tab baru">+</div>
</div>

<!-- ═══ MAIN CONTAINER ═══ -->
<div id="main-container">

    <!-- Search Bar -->
    <div id="search-bar">
        <div style="flex:1; display:flex; flex-direction:column; gap:5px;">
            <div style="display:flex; gap:6px; align-items:center;">
                <input type="text" id="search-field" class="s-input" placeholder="🔍 Cari..." oninput="findInEditor()">
                <span id="s-count" class="s-count">0/0</span>
                <button class="s-btn" onclick="findPrev()">↑</button>
                <button class="s-btn" onclick="findNext()">↓</button>
                <button class="s-close" onclick="toggleSearch()">×</button>
            </div>
            <div class="replace-row">
                <input type="text" id="replace-field" class="s-input" placeholder="Ganti dengan...">
                <button class="s-btn" onclick="replaceOne()" style="white-space:nowrap;font-size:9px;">1x</button>
                <button class="s-btn" onclick="replaceAll()" style="white-space:nowrap;font-size:9px;">All</button>
            </div>
        </div>
    </div>

    <!-- ─── SINGLE EDITOR MODE ─── -->
    <div id="single-editor-wrap">
        <div id="editor"></div>
    </div>

    <!-- ─── CODEPEN MODE ─── -->
    <div id="pen-mode-container">
        <div class="pen-panels">
            <div class="pen-panel">
                <div class="pen-panel-header">
                    <span class="pen-dot dot-html"></span>
                    <span style="color:var(--orange);">HTML</span>
                </div>
                <div id="pen-html-editor" class="pen-editor"></div>
            </div>
            <div class="pen-panel">
                <div class="pen-panel-header">
                    <span class="pen-dot dot-css"></span>
                    <span style="color:#38bdf8;">CSS</span>
                </div>
                <div id="pen-css-editor" class="pen-editor"></div>
            </div>
            <div class="pen-panel">
                <div class="pen-panel-header">
                    <span class="pen-dot dot-js"></span>
                    <span style="color:var(--yellow);">JS</span>
                </div>
                <div id="pen-js-editor" class="pen-editor"></div>
            </div>
        </div>
        <div class="pen-preview-area">
            <div class="pen-preview-bar">
                <span>⚡ LIVE PREVIEW</span>
                <button onclick="runPenPreview()" style="background:var(--panel3);border:1px solid var(--border);color:var(--green);padding:3px 10px;border-radius:4px;font-size:9px;font-weight:800;cursor:pointer;">▶ RUN</button>
            </div>
            <iframe id="pen-preview-frame" sandbox="allow-scripts allow-modals"></iframe>
        </div>
    </div>

</div>

<!-- ═══ STATUS BAR ═══ -->
<div id="status-bar">
    <span id="sb-lang" class="sb-lang" onclick="cycleLang()">HTML</span>
    <span id="sb-cursor">Ln 1, Col 1</span>
    <span id="sb-chars">0 char</span>
    <span class="sb-spacer"></span>
    <span id="sb-mode" class="sb-mode" onclick="togglePenMode()">SINGLE</span>
    <span style="font-size:8px;color:var(--text-dim);">ONYX v5</span>
</div>

<!-- ═══ QUICK TOOLBAR ═══ -->
<div class="quick-tools">
    <button class="q-btn" onclick="ins('<')">&lt;</button>
    <button class="q-btn" onclick="ins('>')">&gt;</button>
    <button class="q-btn" onclick="ins('/')">/</button>
    <button class="q-btn" onclick="ins('\"')">"</button>
    <button class="q-btn" onclick="ins(\'\')">'</button>
    <button class="q-btn" onclick="ins('=')">=</button>
    <button class="q-btn" onclick="ins(':')" >:</button>
    <button class="q-btn" onclick="ins('{')">{</button>
    <button class="q-btn" onclick="ins('}')">}</button>
    <button class="q-btn" onclick="ins('(')">( </button>
    <button class="q-btn" onclick="ins(')')"> )</button>
    <button class="q-btn" onclick="ins(';')">;</button>
    <button class="q-btn" onclick="ins('  ')">⇥</button>
    <button class="q-btn-snippet" onclick="insSnippet('div')">div</button>
    <button class="q-btn-snippet" onclick="insSnippet('p')">p</button>
    <button class="q-btn-snippet" onclick="insSnippet('a')">a</button>
    <button class="q-btn-snippet" onclick="insSnippet('img')">img</button>
    <button class="q-btn-snippet" onclick="insSnippet('flex')">flex</button>
    <button class="q-btn-snippet" onclick="insSnippet('fn')">fn(){}</button>
    <button class="q-btn-snippet" onclick="insSnippet('boilerplate')">HTML5</button>
</div>

<!-- ═══ BOTTOM NAVIGATION ═══ -->
<footer>
    <button onclick="openModal('modal-new')" class="tool-btn"><span>➕</span><span>Baru</span></button>
    <button onclick="openModal('modal-save')" class="tool-btn"><span>💾</span><span>Simpan</span></button>
    <button onclick="openFromDevice()" class="tool-btn"><span>📁</span><span>Buka</span></button>
    <button onclick="openModal('modal-gudang')" class="tool-btn"><span>📦</span><span>Gudang</span></button>
    <button onclick="formatCode()" class="tool-btn"><span>✨</span><span>Format</span></button>
    <button onclick="confirmClear()" class="tool-btn danger"><span>🗑️</span><span>Hapus</span></button>
</footer>

<!-- ═══ FULL PREVIEW ═══ -->
<div id="preview-container">
    <div id="preview-header">
        <div class="prev-title">◈ ONYX PREVIEW ENGINE</div>
        <div class="prev-actions">
            <button onclick="reloadPreview()" class="prev-btn prev-reload">↺ Reload</button>

<script>
// ╔══════════════════════════════════════════════╗
// ║         ONYX ARCHITECT PRO v5               ║
// ║         Core Engine                         ║
// ╚══════════════════════════════════════════════╝

// ─── State ───
let tabs = [];
let gudangData = {};
let activeTabIndex = 0;
let themeIndex = 0;
let penMode = false;
let currentBlobUrl = null;

const THEMES = [
    "tomorrow_night_bright", "monokai", "dracula",
    "nord_dark", "solarized_dark", "github_dark", "one_dark"
];

const FILE_MODES = {
    html: "html", htm: "html", css: "css",
    js: "javascript", ts: "typescript",
    json: "json", xml: "xml", svg: "xml",
    txt: "text", md: "markdown", py: "python"
};

// ─── Init Data ───
(function initData() {
    try {
        const savedTabs = localStorage.getItem('onyx_tabs_v5');
        tabs = savedTabs ? JSON.parse(savedTabs) : [{ name: 'index.html', content: getBoilerplate() }];
    } catch(e) {
        tabs = [{ name: 'index.html', content: getBoilerplate() }];
    }
    try {
        gudangData = JSON.parse(localStorage.getItem('onyx_gudang_v5')) || {};
    } catch(e) {
        gudangData = {};
    }
})();

// ─── ACE MAIN EDITOR ───
const editor = ace.edit("editor");
editor.setTheme("ace/theme/tomorrow_night_bright");
editor.session.setMode("ace/mode/html");
editor.setOptions({
    enableBasicAutocompletion: true,
    enableLiveAutocompletion: true,
    showPrintMargin: false,
    wrap: false,
    fontSize: 13,
    scrollPastEnd: 0.5,
    tabSize: 2,
    useSoftTabs: true,
});
editor.on("change", () => {
    tabs[activeTabIndex].content = editor.getValue();
    saveTabs();
    updateStatusBar();
});
editor.selection.on('changeCursor', updateStatusBar);

// ─── ACE PEN EDITORS ───
const penHtml = ace.edit("pen-html-editor");
const penCss  = ace.edit("pen-css-editor");
const penJs   = ace.edit("pen-js-editor");

[penHtml, penCss, penJs].forEach((ed, i) => {
    ed.setTheme("ace/theme/tomorrow_night_bright");
    ed.setOptions({
        enableBasicAutocompletion: true, enableLiveAutocompletion: true,
        showPrintMargin: false, wrap: true, fontSize: 11, tabSize: 2, useSoftTabs: true,
        showLineNumbers: true, showGutter: true,
    });
    ed.on("change", () => autoRunPen());
});
penHtml.session.setMode("ace/mode/html");
penCss.session.setMode("ace/mode/css");
penJs.session.setMode("ace/mode/javascript");

// Load pen state
(function loadPenState() {
    const ps = JSON.parse(localStorage.getItem('onyx_pen_state') || '{}');
    penHtml.setValue(ps.html || '<div class="box">\n  <h1>Hello from Onyx Pen!</h1>\n  <p>Edit HTML, CSS, JS di atas 🔥</p>\n</div>', -1);
    penCss.setValue(ps.css || 'body {\n  display: flex;\n  justify-content: center;\n  align-items: center;\n  height: 100vh;\n  margin: 0;\n  background: #0d1117;\n  font-family: sans-serif;\n}\n.box {\n  background: #161b22;\n  border: 1px solid #7aa2f7;\n  padding: 2rem;\n  border-radius: 12px;\n  color: #a9b1d6;\n  text-align: center;\n}', -1);
    penJs.setValue(ps.js || "// JavaScript kamu di sini\nconsole.log('Onyx Pen v5 Ready! 🚀');", -1);
})();
penHtml.on("change", savePenState);
penCss.on("change", savePenState);
penJs.on("change", savePenState);

let penDebounce;
function autoRunPen() {
    clearTimeout(penDebounce);
    penDebounce = setTimeout(runPenPreview, 600);
}

function savePenState() {
    localStorage.setItem('onyx_pen_state', JSON.stringify({
        html: penHtml.getValue(),
        css: penCss.getValue(),
        js: penJs.getValue()
    }));
}

// ─── TABS ───
function renderTabs() {
    const bar = document.getElementById('tab-bar');
    // Keep the "+" button
    const addBtn = bar.querySelector('.tab-add');
    bar.innerHTML = '';
    if (addBtn) bar.appendChild(addBtn);
    
    tabs.forEach((tab, i) => {
        const div = document.createElement('div');
        div.className = 'tab' + (i === activeTabIndex ? ' active' : '');
        div.onclick = () => switchTab(i);
        const icon = getFileIcon(tab.name);
        const colorClass = getFileColorClass(tab.name);
        div.innerHTML = `
            <span class="tab-icon ${colorClass}">${icon}</span>
            <span class="tab-name">${tab.name}</span>
            <span class="close-tab" onclick="removeTab(event,${i})">×</span>
        `;
        bar.insertBefore(div, bar.querySelector('.tab-add'));
    });
}

function switchTab(i) {
    activeTabIndex = i;
    editor.setValue(tabs[i].content, -1);
    const ext = getExt(tabs[i].name);
    const mode = FILE_MODES[ext] || 'html';
    editor.session.setMode(`ace/mode/${mode}`);
    renderTabs();
    updateStatusBar();
}

function addTab() {
    let name = document.getElementById('new-filename').value.trim();
    if (!name) name = 'file.html';
    // ✅ FIX: Only add .html if no extension present
    if (!name.includes('.')) name += '.html';
    document.getElementById('new-filename').value = '';
    closeModal('modal-new');
    tabs.push({ name, content: getExt(name) === 'html' ? getBoilerplate() : '' });
    switchTab(tabs.length - 1);
    saveTabs();
}

function removeTab(e, i) {
    e.stopPropagation();
    if (tabs.length <= 1) { toast("⚠️ MINIMAL 1 TAB"); return; }
    tabs.splice(i, 1);
    if (activeTabIndex >= tabs.length) activeTabIndex = tabs.length - 1;
    switchTab(activeTabIndex);
    saveTabs();
}

function updateNewFileHint() {
    const name = document.getElementById('new-filename').value.trim();
    const hint = document.getElementById('new-file-hint');
    if (!name) { hint.textContent = ''; return; }
    const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : 'html (default)';
    const modeMap = { html:'HTML Editor', htm:'HTML Editor', css:'CSS Editor', js:'JavaScript Editor', json:'JSON Editor', txt:'Text Editor', md:'Markdown Editor', py:'Python Editor' };
    hint.textContent = `Mode: ${modeMap[ext] || ext.toUpperCase() + ' Editor'}`;
    hint.style.color = 'var(--accent)';
}

// ─── SAVE ───
function openSaveModal() {
    document.getElementById('save-filename').value = tabs[activeTabIndex].name;
    openModal('modal-save');
}

function saveToGudang() {
    let fname = document.getElementById('save-filename').value.trim();
    if (!fname) fname = tabs[activeTabIndex].name;
    // ✅ FIX: Don't add .html if extension already present
    if (!fname.includes('.')) fname += '.html';
    
    const content = editor.getValue();
    const ext = getExt(fname);
    
    // Determine folder by file type
    const folderMap = { html:'HTML Files', css:'CSS Files', js:'JavaScript Files', json:'JSON Files' };
    const defaultFolder = folderMap[ext] || 'Other Files';
    const folderName = prompt('Nama folder gudang:', defaultFolder) || defaultFolder;
    
    if (!gudangData[folderName]) gudangData[folderName] = [];
    
    // Update existing or push new
    const existing = gudangData[folderName].findIndex(f => f.name === fname);
    const fileObj = { name: fname, content, date: new Date().toLocaleString(), size: content.length };
    if (existing >= 0) gudangData[folderName][existing] = fileObj;
    else gudangData[folderName].push(fileObj);
    
    localStorage.setItem('onyx_gudang_v5', JSON.stringify(gudangData));
    tabs[activeTabIndex].name = fname;
    saveTabs(); renderTabs();
    closeModal('modal-save');
    toast(`✅ TERSIMPAN: ${fname}`);
}

async function saveToDevice() {
    let fname = document.getElementById('save-filename').value.trim();
    if (!fname) fname = tabs[activeTabIndex].name;
    // ✅ FIX: Don't auto-append .html
    if (!fname.includes('.')) fname += '.html';
    
    const content = editor.getValue();
    const ext = getExt(fname);
    
    // ✅ FIX: Correct MIME type per extension
    const mimeMap = {
        html: 'text/html', htm: 'text/html',
        css: 'text/css', js: 'text/javascript',
        json: 'application/json', txt: 'text/plain',
        xml: 'text/xml', svg: 'image/svg+xml', md: 'text/markdown'
    };
    const mime = mimeMap[ext] || 'text/plain';
    
    if ('showSaveFilePicker' in window) {
        try {
            const extDescMap = {
                html: [{ description: 'HTML File', accept: { 'text/html': ['.html'] } }],
                css:  [{ description: 'CSS File', accept: { 'text/css': ['.css'] } }],
                js:   [{ description: 'JavaScript', accept: { 'text/javascript': ['.js'] } }],
            };
            const handle = await window.showSaveFilePicker({
                suggestedName: fname,
                types: extDescMap[ext] || [{ description: 'Text File', accept: { 'text/plain': ['.txt', '.html', '.css', '.js'] } }]
            });
            const writable = await handle.createWritable();
            await writable.write(content);
            await writable.close();
            toast("✅ TERSIMPAN KE PERANGKAT");
        } catch(e) { if (e.name !== 'AbortError') toast("❌ GAGAL SIMPAN"); }
    } else {
        const blob = new Blob([content], { type: mime });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fname;
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 1000);
        toast("📥 MENGUNDUH: " + fname);
    }
    closeModal('modal-save');
}

function saveTabs() {
    localStorage.setItem('onyx_tabs_v5', JSON.stringify(tabs));
}

// ─── OPEN FILE ───
function openFromDevice() {

}

function handleFileOpen(e) {
    const files = Array.from(e.target.files);
    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            tabs.push({ name: file.name, content: ev.target.result });
            switchTab(tabs.length - 1);
            saveTabs();
        };
        reader.readAsText(file);
    });
    if (files.length > 0) toast(`📂 ${files.length} BERKAS DIBUKA`);
    e.target.value = '';
}

// ─── PREVIEW ───
function runCode() {
    if (penMode) { runPenPreview(); return; }
    const content = editor.getValue();
    const ext = getExt(tabs[activeTabIndex].name);
    
    let html = content;
    // If CSS file, wrap it
    if (ext === 'css') {
        html = `<!DOCTYPE html><html><head><style>${content}</style></head><body><p style="color:#888;font-family:sans-serif;padding:20px;">CSS Preview</p></body></html>`;
    }
    // If JS file, wrap it  
    else if (ext === 'js') {
        html = `<!DOCTYPE html><html><head></head><body><pre id="out" style="font-family:monospace;padding:20px;background:#0d1117;color:#a9b1d6;min-height:100vh;margin:0;"></pre><script>
const _log = console.log;
console.log = (...a) => { document.getElementById('out').textContent += a.join(' ') + '\\n'; _log(...a); };
try { ${content} } catch(e) { document.getElementById('out').textContent += '\\n❌ Error: ' + e.message; }
<\/script></body></html>`;
    }
    
    if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);

    const frame = document.getElementById('preview-frame-full');
    frame.src = currentBlobUrl;

// ─── SEARCH & REPLACE ───
let searchAnnotations = [];
function toggleSearch() {
    const bar = document.getElementById('search-bar');
    const visible = bar.style.display === 'flex';
    bar.style.display = visible ? 'none' : 'flex';
    if (!visible) document.getElementById('search-field').focus();
    else editor.find('', {});

function findInEditor() {
    const val = document.getElementById('search-field').value;
    if (!val) { document.getElementById('s-count').textContent = ''; return; }
    editor.find(val, { backwards: false, wrap: true, caseSensitive: false });
    // Count occurrences
    const content = editor.getValue();
    const count = (content.match(new RegExp(val.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi')) || []).length;
    document.getElementById('s-count').textContent = `${count} hasil`;
}
function findNext() { editor.find(document.getElementById('search-field').value, { backwards: false, wrap: true }); }
function findPrev() { editor.find(document.getElementById('search-field').value, { backwards: true, wrap: true }); }
function replaceOne() {
    editor.replace(document.getElementById('replace-field').value);
    findInEditor();
}
function replaceAll() {
    const s = document.getElementById('search-field').value;
    const r = document.getElementById('replace-field').value;

    const count = editor.replaceAll(r, { needle: s });

// ─── FORMAT CODE ───
function formatCode() {
    const content = editor.getValue();
    const ext = getExt(tabs[activeTabIndex].name);
    try {
        if (ext === 'json') {
            editor.setValue(JSON.stringify(JSON.parse(content), null, 2), -1);
            toast("✨ JSON DIFORMAT");
        } else {
            // Basic HTML indent
            const formatted = basicFormat(content, ext);
            editor.setValue(formatted, -1);
            toast("✨ KODE DIFORMAT");
        }
    } catch(e) {
        toast("❌ FORMAT GAGAL");
    }
}

function basicFormat(code, ext) {
    if (ext === 'json') return JSON.stringify(JSON.parse(code), null, 2);
    // Simple re-indent
    let result = '', indent = 0;
    const lines = code.split('\n');
    lines.forEach(line => {
        const trimmed = line.trim();
        if (!trimmed) { result += '\n'; return; }
        // Decrease indent for closing tags/braces
        if (/^(<\/|})/.test(trimmed)) indent = Math.max(0, indent - 1);
        result += '  '.repeat(indent) + trimmed + '\n';
        // Increase indent for opening tags/braces  
        if (/(<[^\/!][^>]*[^\/]>|{)\s*$/.test(trimmed) && !/<.*\/>/.test(trimmed)) indent++;
    });
    return result.trimEnd();
}

// ─── GUDANG ───
function renderGudangList() {
    const container = document.getElementById('gudang-list-container');
    container.innerHTML = '';
    const keys = Object.keys(gudangData);
    if (keys.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:var(--text-dim);font-size:10px;padding:20px;">Gudang kosong. Simpan file dulu!</div>';
        return;
    }
    keys.forEach(folder => {
        const files = gudangData[folder];
        const header = document.createElement('div');
        header.className = 'folder-header';
        header.innerHTML = `
            <div style="display:flex;align-items:center;gap:8px;">
                <span>📁</span>
                <span class="folder-header-name">${folder}</span>
            </div>
            <span class="folder-badge">${files.length} file</span>
        `;
        header.onclick = () => toggleFolder(folder);
        
        const content = document.createElement('div');
        content.className = 'folder-content';
        content.id = `folder-${CSS.escape(folder)}`;
        
        files.forEach((file, i) => {
            const item = document.createElement('div');
            item.className = 'file-item';
            const icon = getFileIcon(file.name);
            const colorClass = getFileColorClass(file.name);
            const sizeStr = file.size ? formatSize(file.size) : '';
            item.innerHTML = `
                <div class="file-info">
                    <div class="file-name"><span class="${colorClass}">${icon}</span> ${file.name}</div>
                    <div class="file-date">${file.date}${sizeStr ? ' · ' + sizeStr : ''}</div>
                </div>
                <div class="file-actions">
                    <button class="fa-btn" onclick="loadGudang('${escAttr(folder)}',${i})" title="Buka">🔓</button>
                    <button class="fa-btn" onclick="copyGudang('${escAttr(folder)}',${i})" title="Salin">📋</button>
                    <button class="fa-btn" onclick="dlGudang('${escAttr(folder)}',${i})" title="Unduh">⬇️</button>
                    <button class="fa-btn" onclick="deleteGudang('${escAttr(folder)}',${i})" title="Hapus">🗑️</button>
                </div>
            `;
            content.appendChild(item);
        });
        
        container.appendChild(header);
        container.appendChild(content);
    });
}

function toggleFolder(name) {
    const el = document.getElementById(`folder-${CSS.escape(name)}`);
    if (el) el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function loadGudang(folder, i) {
    const file = gudangData[folder][i];
    tabs.push({ name: file.name, content: file.content });
    saveTabs();
    switchTab(tabs.length - 1);
    closeModal('modal-gudang');
    toast("📂 " + file.name + " DIBUKA");
}

function copyGudang(folder, i) {
    navigator.clipboard.writeText(gudangData[folder][i].content)
        .then(() => toast("📋 KODE DISALIN"))
        .catch(() => toast("❌ CLIPBOARD GAGAL"));
}

function dlGudang(folder, i) {
    const file = gudangData[folder][i];
    const ext = getExt(file.name);
    const mimeMap = { html:'text/html', css:'text/css', js:'text/javascript', json:'application/json', txt:'text/plain' };
    const blob = new Blob([file.content], { type: mimeMap[ext] || 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = file.name; // ✅ FIX: Uses original filename, no appending
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    toast("⬇️ MENGUNDUH: " + file.name);
}

function deleteGudang(folder, i) {
    if (!confirm(`Hapus "${gudangData[folder][i].name}"?`)) return;
    gudangData[folder].splice(i, 1);
    if (gudangData[folder].length === 0) delete gudangData[folder];
    localStorage.setItem('onyx_gudang_v5', JSON.stringify(gudangData));
    renderGudangList();
    toast("🗑️ FILE DIHAPUS");
}

function filterGudang() {
    const val = document.getElementById('search-gudang').value.toLowerCase();
    document.querySelectorAll('.folder-header').forEach(el => {
        el.style.display = el.textContent.toLowerCase().includes(val) ? 'flex' : 'none';
    });
}

// ─── THEME ───
function changeTheme() {
    themeIndex = (themeIndex + 1) % THEMES.length;
    const theme = THEMES[themeIndex];
    editor.setTheme(`ace/theme/${theme}`);
    [penHtml, penCss, penJs].forEach(ed => ed.setTheme(`ace/theme/${theme}`));
    toast(`🎨 ${theme.replace(/_/g, ' ').toUpperCase()}`);
}

function cycleLang() {
    const langs = ['html', 'css', 'javascript', 'json', 'markdown', 'text'];
    const cur = editor.session.$modeId.split('/').pop();
    const i = langs.indexOf(cur);
    const next = langs[(i + 1) % langs.length];
    editor.session.setMode(`ace/mode/${next}`);
    updateStatusBar();
}

// ─── STATUS BAR ───
function updateStatusBar() {
    const pos = editor.getCursorPosition();
    document.getElementById('sb-cursor').textContent = `Ln ${pos.row+1}, Col ${pos.column+1}`;
    document.getElementById('sb-chars').textContent = `${editor.getValue().length} char`;
    const mode = editor.session.$modeId?.split('/').pop().toUpperCase() || 'TXT';
    const sb = document.getElementById('sb-lang');
    sb.textContent = mode;
    const colorMap = { HTML:'#ff9e64', CSS:'#38bdf8', JAVASCRIPT:'#e0af68', JSON:'#9ece6a', MARKDOWN:'#bb9af7' };
    sb.style.background = colorMap[mode] || 'var(--accent)';
}

// ─── HELPERS ───
function getExt(name) { return (name.split('.').pop() || 'html').toLowerCase(); }

function getFileIcon(name) {
    const ext = getExt(name);
    const icons = { html:'◈', htm:'◈', css:'◉', js:'◆', json:'◇', txt:'▭', md:'◫', xml:'◈', svg:'◎', py:'◈' };
    return icons[ext] || '◈';
}

function getFileColorClass(name) {
    const ext = getExt(name);
    if (['html','htm'].includes(ext)) return 'ft-html';
    if (ext === 'css') return 'ft-css';
    if (['js','ts'].includes(ext)) return 'ft-js';
    return 'ft-other';
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    return (bytes / 1024).toFixed(1) + ' KB';
}

function escAttr(str) { return str.replace(/'/g, "\\'"); }

// ─── TOAST ───
let toastTimer;
function toast(msg) {
    const el = document.getElementById('onyx-toast');
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.style.display = 'none', 2500);
}

// ─── MODAL ───
function openModal(id) {
    document.getElementById(id).style.display = 'flex';
    if (id === 'modal-gudang') renderGudangList();
    if (id === 'modal-save') {
        document.getElementById('save-filename').value = tabs[activeTabIndex].name;
    }
}
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

// Close modal on backdrop click
document.querySelectorAll('.v-modal').forEach(modal => {
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal(modal.id);
    });
});

// ─── KEYBOARD SHORTCUTS ───
document.addEventListener('keydown', (e) => {
    if (e.ctrlKey || e.metaKey) {
        if (e.key === 's') { e.preventDefault(); openModal('modal-save'); }
        if (e.key === 'f') { e.preventDefault(); toggleSearch(); }
        if (e.key === 'Enter') { e.preventDefault(); runCode(); }
        if (e.key === 'n') { e.preventDefault(); openModal('modal-new'); }
    }
    if (e.key === 'Escape') {
        closePreview();
        document.getElementById('search-bar').style.display = 'none';
        document.querySelectorAll('.v-modal').forEach(m => m.style.display = 'none');
    }
});

// ─── PWA ───
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ─── SAVE WARNING ───
window.onbeforeunload = () => "Pastikan kode sudah tersimpan di Gudang Berkas!";

// ─── INIT ───
renderTabs();
editor.setValue(tabs[activeTabIndex].content, -1);
updateStatusBar();
setTimeout(runPenPreview, 300);

console.log('%cONYX ARCHITECT PRO v5 🔥', 'color:#7aa2f7;font-size:16px;font-weight:bold;');
</script>
