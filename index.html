<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ONYX ARCHITECT PRO v4.5 - Vivi Gioncyn</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#05070a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1005/1005141.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Fira+Code&family=Playball&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ext-language_tools.min.js"></script>

    <style>
        :root { --v-bg: #05070a; --v-panel: #0d1117; --v-accent: #7aa2f7; --v-text: #a9b1d6; --v-gold: #d4af37; --v-gold-light: #f1d592; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: var(--v-bg); color: var(--v-text); display: flex; flex-direction: column; font-family: 'Fira Code', monospace; position: fixed; }

        header { background: var(--v-panel); padding: 12px 15px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; z-index: 100; flex-shrink: 0; }
        
        .brand-wrapper { display: flex; flex-direction: column; line-height: 1; }
        .brand-title { 
            font-family: 'Cinzel', serif; 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--v-gold); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--v-gold), #fff, var(--v-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        .signature { 
            font-family: 'Playball', cursive; 
            font-size: 11px; 
            color: #fff; 
            margin-top: 2px;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        #tab-bar { background: var(--v-panel); display: flex; overflow-x: auto; border-bottom: 1px solid #30363d; scrollbar-width: none; flex-shrink: 0; }
        .tab { padding: 8px 12px; font-size: 10px; color: #8b949e; border-right: 1px solid #30363d; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .tab.active { background: #161b22; color: var(--v-accent); border-bottom: 2px solid var(--v-accent); }
        .close-tab { font-size: 16px; color: #ef4444; padding: 2px 6px; font-weight: bold; cursor: pointer; }

        #main-container { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        #editor { flex: 1; font-size: 14px !important; width: 100%; }

        #preview-container { display: none; position: fixed; inset: 0; background: white; z-index: 1000; flex-direction: column; }
        #preview-header { background: #1c2128; color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; }
        #preview-frame { flex: 1; width: 100%; border: none; background: white; }

        #custom-search-bar { display: none; background: #1c2128; padding: 10px; border-bottom: 1px solid #30363d; gap: 8px; align-items: center; position: absolute; top: 0; left: 0; right: 0; z-index: 50; }
        .search-input { flex: 1; background: #05070a; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 4px; font-size: 12px; outline: none; }
        .nav-btn { background: #30363d; color: white; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; }

        .quick-tools { background: var(--v-panel); display: flex; overflow-x: auto; padding: 8px 5px; gap: 6px; border-top: 1px solid #30363d; flex-shrink: 0; }
        .q-btn { background: #1c2128; color: white; border: 1px solid #444c56; flex: 1; min-width: 42px; height: 40px; border-radius: 6px; font-size: 15px; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        footer { background: var(--v-panel); height: 55px; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #30363d; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
        .tool-btn { display: flex; flex-direction: column; align-items: center; font-size: 8px; color: #8b949e; border: none; background: none; }

        #onyx-toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #161b22; border: 1px solid var(--v-gold); color: white; padding: 12px 24px; border-radius: 50px; font-size: 10px; font-weight: bold; z-index: 10000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-transform: uppercase; letter-spacing: 1px; }

        .v-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
        .v-box { background: #161b22; width: 100%; max-width: 320px; border-radius: 12px; padding: 20px; border: 1px solid var(--v-gold); }

        .gudang-list { max-height: 300px; overflow-y: auto; margin-top: 10px; }
        .folder-header { background: #0d1117; border: 1px solid var(--v-gold); padding: 12px; border-radius: 8px; margin-top: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .file-item { background: #1c2128; border: 1px solid #30363d; padding: 10px; margin-left: 15px; margin-top: 5px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .folder-content { display: none; margin-bottom: 10px; }
    </style>
</head>
<body onclick="hideBrowserUI()">

    <div id="onyx-toast"></div>

    <header>
        <div class="brand-wrapper">
            <div class="brand-title">Onyx Architect Pro</div>
            <div class="signature"><span style="font-family:'Montserrat'; font-size:6px; font-weight:bold; color:#7aa2f7; vertical-align:middle; margin-right:4px;">BY</span> Vivi Gioncyn</div>
        </div>
        <div class="flex gap-2">
            <button onclick="changeTheme()" class="bg-purple-700 text-white px-3 py-1.5 rounded text-[9px] font-bold uppercase">🎨 Tema</button>
            <button onclick="toggleSearch()" id="btn-cari" class="bg-gray-800 text-white px-3 py-1.5 rounded text-[9px] font-bold uppercase">🔍 Cari</button>
            <button onclick="runFullCode()" class="bg-blue-600 text-white px-4 py-1.5 rounded text-[9px] font-black uppercase tracking-widest">RUN</button>
        </div>
    </header>

    <div id="tab-bar"></div>

    <div id="main-container">
        <div id="custom-search-bar">
            <input type="text" id="search-field" class="search-input" placeholder="Cari teks..." oninput="findNext(true)">
            <button class="nav-btn" onclick="findPrev()">&lt;</button>
            <button class="nav-btn" onclick="findNext()">&gt;</button>
            <button class="nav-btn text-red-500" onclick="toggleSearch()">×</button>
        </div>
        <div id="editor"></div>
    </div>

    <div id="preview-container">
        <div id="preview-header">
            <span class="font-bold text-[10px] tracking-tighter">PREVIEW: ONYX ENGINE</span>
            <button onclick="closePreview()" class="bg-red-600 px-4 py-1.5 rounded text-[10px] font-black uppercase">Tutup</button>
        </div>
        <iframe id="preview-frame"></iframe>
    </div>

    <div class="quick-tools">
        <button class="q-btn" onclick="insertCode('<')">&lt;</button>
        <button class="q-btn" onclick="insertCode('>')">&gt;</button>
        <button class="q-btn" onclick="insertCode('/')">/</button>
        <button class="q-btn" onclick="insertCode('\"')">"</button>
        <button class="q-btn" onclick="insertCode('=')">=</button>
        <button class="q-btn" onclick="insertCode(':')">:</button>
        <button class="q-btn" onclick="insertCode('{')">{</button>
        <button class="q-btn" onclick="insertCode('}')">}</button>
        <button class="q-btn" onclick="insertCode(';')">;</button>
    </div>

    <footer>
        <button onclick="openModal('modal-new')" class="tool-btn"><span>➕</span><span>Baru</span></button>
        <button onclick="openModal('modal-save-choice')" class="tool-btn"><span>💾</span><span>Simpan</span></button>
        <button onclick="openFromInternal()" class="tool-btn"><span>📁</span><span>Buka</span></button>
        <button onclick="openModal('modal-gudang')" class="tool-btn"><span>📦</span><span>Gudang</span></button>
        <button onclick="openModal('modal-delete')" class="tool-btn text-red-500"><span>🗑️</span><span>Hapus</span></button>
    </footer>

    <div id="modal-save-choice" class="v-modal"><div class="v-box">
        <h3 class="text-white text-[11px] font-black mb-4 text-center">LOKASI PENYIMPANAN</h3>
        <button onclick="prepareSaveGudang()" class="w-full bg-blue-600 text-white py-3 rounded mb-2 text-[10px] font-bold uppercase">1. Simpan ke Gudang Berkas</button>
        <button onclick="saveToPhone()" class="w-full bg-gray-700 text-white py-3 rounded mb-4 text-[10px] font-bold uppercase">2. Simpan ke Penyimpanan Ponsel</button>
        <button onclick="closeModal('modal-save-choice')" class="w-full text-gray-500 text-[10px] font-bold">BATAL</button>
    </div></div>

    <div id="modal-save-gudang" class="v-modal"><div class="v-box">
        <h3 class="text-white text-[11px] font-black mb-2 uppercase text-center">Input Nama Folder</h3>
        <input type="text" id="gudang-folder-name" class="bg-black border border-gray-700 w-full p-2 mb-4 rounded text-white text-xs" placeholder="Contoh: PROYEK A">
        <div class="flex gap-2">
            <button onclick="closeModal('modal-save-gudang')" class="flex-1 text-gray-500 text-[10px] font-bold">BATAL</button>
            <button onclick="confirmSaveGudang()" class="flex-1 bg-green-600 text-white py-2 rounded text-[10px] font-black">KONFIRMASI</button>
        </div>
    </div></div>

    <div id="modal-gudang" class="v-modal"><div class="v-box" style="max-width: 350px;">
        <h3 class="text-white text-[11px] font-black mb-2 uppercase text-center">📦 Gudang Berkas</h3>
        <input type="text" id="search-gudang" oninput="filterGudang()" class="bg-black border border-gray-700 w-full p-2 mb-2 rounded text-white text-xs" placeholder="Cari folder...">
        <div id="gudang-list-container" class="gudang-list"></div>
        <button onclick="closeModal('modal-gudang')" class="w-full mt-4 text-gray-500 text-[10px] font-bold">TUTUP</button>
    </div></div>

    <div id="modal-new" class="v-modal"><div class="v-box text-center">
        <input type="text" id="new-filename" class="bg-black border border-gray-700 w-full p-2 my-3 rounded text-white text-xs" placeholder="nama_file.html">
        <div class="flex gap-2">
            <button onclick="closeModal('modal-new')" class="flex-1 text-gray-500 text-[10px] font-bold">BATAL</button>
            <button onclick="addTab()" class="flex-1 bg-blue-600 text-white py-2 rounded text-[10px] font-black">BUAT</button>
        </div>
    </div></div>

    <div id="modal-delete" class="v-modal"><div class="v-box text-center">
        <h3 class="text-red-500 text-[12px] font-black">HAPUS EDITOR?</h3>
        <div class="flex gap-2 mt-4">
            <button onclick="closeModal('modal-delete')" class="flex-1 text-gray-500 text-[10px] font-bold">BATAL</button>
            <button onclick="clearCurrentEditor()" class="flex-1 bg-red-600 text-white py-2 rounded text-[10px] font-black">HAPUS</button>
        </div>
    </div></div>

    <input type="file" id="internal-file-input" style="display: none;" onchange="handleFileSelect(event)">

    <script>
        // LOGIKA DASAR ONYX TETAP UTUH
        let savedData = localStorage.getItem('onyx_tabs_v4');
        let tabs = savedData ? JSON.parse(savedData) : [{ name: 'index.html', content: '\n' }];
        let gudangData = JSON.parse(localStorage.getItem('onyx_gudang_folders')) || {}; 
        let activeTabIndex = 0;
        let themeIndex = 0;
        const themes = ["tomorrow_night_bright", "monokai", "dracula", "nord_dark", "solarized_dark"];

        const editor = ace.edit("editor");
        editor.setTheme("ace/theme/tomorrow_night_bright");
        editor.session.setMode("ace/mode/html");
        
        editor.setOptions({ 
            enableBasicAutocompletion: true, 
            enableLiveAutocompletion: true, 
            showPrintMargin: false,
            wrap: false,
            hScrollBarAlwaysVisible: true,
            vScrollBarAlwaysVisible: true,
            scrollPastEnd: 0.8
        });

        editor.on("change", () => {
            tabs[activeTabIndex].content = editor.getValue();
            localStorage.setItem('onyx_tabs_v4', JSON.stringify(tabs));
        });

        function showOnyxToast(msg) {
            const toast = document.getElementById('onyx-toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function prepareSaveGudang() {
            closeModal('modal-save-choice');
            openModal('modal-save-gudang');
        }

        function confirmSaveGudang() {
            const folderName = document.getElementById('gudang-folder-name').value.toUpperCase() || 'FOLDER TANPA NAMA';
            const fileName = tabs[activeTabIndex].name;
            const content = editor.getValue();
            if (!gudangData[folderName]) gudangData[folderName] = [];
            gudangData[folderName].push({ name: fileName, content: content, date: new Date().toLocaleString() });
            localStorage.setItem('onyx_gudang_folders', JSON.stringify(gudangData));
            showOnyxToast(`✅ TERNSIMPAN DI FOLDER: ${folderName}`);
            closeModal('modal-save-gudang');
        }

        function renderGudangList() {
            const container = document.getElementById('gudang-list-container');
            container.innerHTML = '';
            for (let folder in gudangData) {
                const fHeader = document.createElement('div');
                fHeader.className = 'folder-header';
                fHeader.onclick = () => toggleFolder(folder);
                fHeader.innerHTML = `<span>📁 ${folder}</span><span>▼</span>`;
                const fContent = document.createElement('div');
                fContent.id = `folder-${folder.replace(/\s/g, '-')}`;
                fContent.className = 'folder-content';
                gudangData[folder].forEach((file, index) => {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.innerHTML = `
                        <div style="font-size: 10px; color: #fff;">📄 ${file.name}</div>
                        <div class="flex gap-2">
                            <button onclick="loadFromGudang('${folder}', ${index})" class="text-blue-400 text-[14px]">🔓</button>
                            <button onclick="copyGudang('${folder}', ${index})" class="text-yellow-400 text-[14px]">📋</button>
                            <button onclick="deleteGudang('${folder}', ${index})" class="text-red-500 text-[14px]">🗑️</button>
                        </div>
                    `;
                    fContent.appendChild(item);
                });
                container.appendChild(fHeader);
                container.appendChild(fContent);
            }
        }

        function toggleFolder(name) {
            const id = `folder-${name.replace(/\s/g, '-')}`;
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        function loadFromGudang(folder, index) {
            const file = gudangData[folder][index];
            tabs.push({ name: file.name, content: file.content });
            switchTab(tabs.length - 1);
            closeModal('modal-gudang');
            showOnyxToast("📂 BERKAS DIBUKA");
        }

        function deleteGudang(folder, index) {
            gudangData[folder].splice(index, 1);
            if (gudangData[folder].length === 0) delete gudangData[folder];
            localStorage.setItem('onyx_gudang_folders', JSON.stringify(gudangData));
            renderGudangList();
            showOnyxToast("🗑️ BERKAS DIHAPUS");
        }

        function copyGudang(folder, index) {
            navigator.clipboard.writeText(gudangData[folder][index].content);
            showOnyxToast("📋 KODE DISALIN");
        }

        function filterGudang() {
            const val = document.getElementById('search-gudang').value.toLowerCase();
            document.querySelectorAll('.folder-header').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(val) ? 'flex' : 'none';
            });
        }

        async function saveToPhone() {
            const content = editor.getValue();
            const fileName = tabs[activeTabIndex].name;
            if ('showSaveFilePicker' in window) {
                try {
                    const handle = await window.showSaveFilePicker({ suggestedName: fileName, types: [{ description: 'HTML File', accept: { 'text/html': ['.html'] } }] });
                    const writable = await handle.createWritable();
                    await writable.write(content);
                    await writable.close();
                    showOnyxToast("✅ TERNSIMPAN KE PONSEL");
                } catch (e) { }
            } else {
                const blob = new Blob([content], {type: 'text/html'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = fileName;
                a.click();
                showOnyxToast("📥 MENGUNDUH BERKAS");
            }
            closeModal('modal-save-choice');
        }

        function renderTabs() {
            const bar = document.getElementById('tab-bar');
            bar.innerHTML = '';
            tabs.forEach((tab, index) => {
                const div = document.createElement('div');
                div.className = `tab ${index === activeTabIndex ? 'active' : ''}`;
                div.onclick = () => switchTab(index);
                div.innerHTML = `<span>${tab.name}</span> <span class="close-tab" onclick="removeTab(event, ${index})">×</span>`;
                bar.appendChild(div);
            });
        }
        function switchTab(index) { activeTabIndex = index; editor.setValue(tabs[index].content, -1); renderTabs(); }
        function removeTab(e, index) { e.stopPropagation(); if (tabs.length > 1) { tabs.splice(index, 1); switchTab(0); } }
        function addTab() { const name = document.getElementById('new-filename').value || 'file.html'; tabs.push({ name: name, content: '' }); document.getElementById('new-filename').value = ''; closeModal('modal-new'); switchTab(tabs.length - 1); }
        function runFullCode() { const container = document.getElementById('preview-container'); const frame = document.getElementById('preview-frame'); container.style.display = 'flex'; const blob = new Blob([editor.getValue()], { type: 'text/html' }); frame.src = URL.createObjectURL(blob); }
        function closePreview() { document.getElementById('preview-container').style.display = 'none'; }
        function toggleSearch() { const bar = document.getElementById('custom-search-bar'); bar.style.display = (bar.style.display === 'flex') ? 'none' : 'flex'; }
        function findNext(fromInput = false) { editor.find(document.getElementById('search-field').value, { backwards: false, wrap: true }); }
        function findPrev() { editor.find(document.getElementById('search-field').value, { backwards: true, wrap: true }); }
        function insertCode(char) { editor.insert(char); }
        function openFromInternal() { document.getElementById('internal-file-input').click(); }
        function handleFileSelect(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => { tabs.push({ name: file.name, content: ev.target.result }); switchTab(tabs.length - 1); showOnyxToast("📂 BERKAS DIIMPOR"); };
            reader.readAsText(file);
        }
        function clearCurrentEditor() { editor.setValue(""); closeModal('modal-delete'); showOnyxToast("🗑️ EDITOR DIBERSIHKAN"); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; if(id === 'modal-gudang') renderGudangList(); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function changeTheme() { themeIndex = (themeIndex + 1) % themes.length; editor.setTheme("ace/theme/" + themes[themeIndex]); showOnyxToast(`🎨 TEMA: ${themes[themeIndex].toUpperCase()}`); }
        function hideBrowserUI() { if (document.activeElement.tagName !== "INPUT" && !document.activeElement.classList.contains('ace_text-input')) window.scrollTo(0, 1); }

        // --- TAMBAHAN FITUR PWA (TIDAK MENGGANGGU CODE ASLI) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(() => {
                    console.log('Onyx PWA Ready!');
                });
            });
        }
        window.onbeforeunload = function() { return "Pastikan kodemu sudah tersimpan di Gudang Berkas!"; };

        renderTabs();
        editor.setValue(tabs[activeTabIndex].content, -1);
    </script>
</body>
</html>
